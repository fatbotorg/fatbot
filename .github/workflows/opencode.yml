name: opencode

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run opencode
        uses: sst/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/claude-sonnet-4-5
          prompt: |
            Review the changes in this pull request thoroughly.
            After your review, decide whether the PR is ready to merge.
            If you determine it is ready, run the following shell command to approve it:
              gh pr review ${{ github.event.issue.number }} --approve --body "<your review summary>"
            If you find issues that must be fixed first, do NOT approve — instead leave a review comment explaining what needs to change.
            The GH_TOKEN environment variable is already available for the gh CLI.